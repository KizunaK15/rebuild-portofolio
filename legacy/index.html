        // --- COMPONENTS ---
        const CustomCursor = () => {
            const dotRef = useRef(null);
            const outlineRef = useRef(null);
            const requestRef = useRef(null);
            const mousePos = useRef({ x: 0, y: 0 });
            const outlinePos = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const onMouseMove = (e) => {
                    mousePos.current = { x: e.clientX, y: e.clientY };
                    if (dotRef.current) dotRef.current.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
                    document.body.classList.remove('cursor-hidden');
                };
                const animateOutline = () => {
                    const ease = 0.15;
                    outlinePos.current.x += (mousePos.current.x - outlinePos.current.x) * ease;
                    outlinePos.current.y += (mousePos.current.y - outlinePos.current.y) * ease;
                    if (outlineRef.current) outlineRef.current.style.transform = `translate(${outlinePos.current.x}px, ${outlinePos.current.y}px) translate(-50%, -50%)`;
                    requestRef.current = requestAnimationFrame(animateOutline);
                };
                window.addEventListener('mousemove', onMouseMove);
                requestRef.current = requestAnimationFrame(animateOutline);
                const handleHover = (e) => document.body.classList[e.type === 'mouseover' && e.target.closest('a, button, .interactive') ? 'add' : 'remove']('hovering');
                document.addEventListener('mouseover', handleHover);
                document.addEventListener('mouseout', handleHover);
                return () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    cancelAnimationFrame(requestRef.current);
                    document.removeEventListener('mouseover', handleHover);
                    document.removeEventListener('mouseout', handleHover);
                };
            }, []);
            return <><div ref={dotRef} className="cursor-dot hidden md:block"></div><div ref={outlineRef} className="cursor-outline hidden md:block"></div></>;
        };

        const TiltCard = ({ children, className = "" }) => {
            const cardRef = useRef(null);
            const handleMove = (e) => {
                if (!cardRef.current || window.innerWidth < 768) return; // Disable tilt on mobile
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -5;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 5;
                cardRef.current.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.01, 1.01, 1.01)`;
            };
            const handleLeave = () => {
                if (cardRef.current) cardRef.current.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            };
            return (
                <div ref={cardRef} className={`tilt-card interactive ${className}`} onMouseMove={handleMove} onMouseLeave={handleLeave}>
                    <div className="tilt-content h-full">{children}</div>
                </div>
            );

        const CyberBackground = ({ isDark }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width, height, particles = [];
                let mouse = { x: -1000, y: -1000 };
                const color = isDark ? { r: 0, g: 255, b: 136 } : { r: 37, g: 99, b: 235 };
                const resize = () => { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; };
                class Particle {
                    constructor() {
                        this.x = Math.random() * width; this.y = Math.random() * height;
                        this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
                        this.size = Math.random() * 2 + 1;
                    }
                    update() {
                        this.x += this.vx; this.y += this.vy;
                        if (this.x < 0 || this.x > width) this.vx *= -1;
                        if (this.y < 0 || this.y > height) this.vy *= -1;
                        let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 120) {
                            this.vx -= (dx/distance) * 0.02; this.vy -= (dy/distance) * 0.02; // Gentle repel
                        }
                    }
                    draw() { ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.6)`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
                }
                const init = () => { resize(); particles = []; for (let i = 0; i < 50; i++) particles.push(new Particle()); };
                const animate = () => {
                    ctx.clearRect(0, 0, width, height);
                    for (let a = 0; a < particles.length; a++) {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x; let dy = particles[a].y - particles[b].y;
                            let dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${1 - dist/100})`;
                                ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(particles[a].x, particles[a].y); ctx.lineTo(particles[b].x, particles[b].y); ctx.stroke();
                            }
                        }
                    }
                    particles.forEach(p => { p.update(); p.draw(); });
                    requestAnimationFrame(animate);
                };
                window.addEventListener('resize', resize);
                window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
                init(); animate();
                return () => window.removeEventListener('resize', resize);
            }, [isDark]);
            return <><canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full -z-10" /><div className="cyber-grid"></div></>;

                const handleType = () => {
                    const i = loopNum % phrases.length;
                    const fullText = phrases[i];
                    setText(isDeleting ? fullText.substring(0, text.length - 1) : fullText.substring(0, text.length + 1));
                    setTypingSpeed(isDeleting ? 40 : 100);
                    if (!isDeleting && text === fullText) setTimeout(() => setIsDeleting(true), 2000);
                    else if (isDeleting && text === '') { setIsDeleting(false); setLoopNum(loopNum + 1); }
                };
                const timer = setTimeout(handleType, typingSpeed);
                return () => clearTimeout(timer);
            }, [text, isDeleting, loopNum, phrases, typingSpeed]);
            return <span className={`font-mono text-xl md:text-2xl font-bold ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>{text}<span className="animate-pulse">_</span></span>;
        };

        // --- LAYOUT COMPONENTS ---
        const Sidebar = ({ user, isDark, activeTab, scrollToSection, t }) => {
            const navItems = [
                { id: 'home', label: t.nav.home, icon: HomeIcon },
                { id: 'projects', label: t.nav.projects, icon: ChipIcon },
                { id: 'achievements', label: t.nav.achievements, icon: TrophyIcon },
            ];
            return (
                <div className={`hidden md:flex flex-col w-64 h-screen fixed left-0 top-0 glass-panel border-r ${isDark ? 'border-matrix-accent/30' : 'border-corp-accent/30'} z-40 transition-colors duration-300`}>
                    <div className="p-6 flex flex-col items-center border-b border-gray-700/30">
                        <div className={`w-24 h-24 rounded-full p-1 border-2 border-dashed ${isDark ? 'border-matrix-accent' : 'border-corp-accent'} mb-4 animate-spin-slow`}>
                            <div className="w-full h-full rounded-full overflow-hidden bg-gray-900">
                                <SmartImage src={user.photo} alt={user.name} className="w-full h-full" />
                            </div>
                        </div>
                        <h2 className={`font-bold text-lg text-center glitch-wrapper mb-2 ${isDark ? 'text-white' : 'text-gray-800'}`}>
                            <span className={isDark ? "glitch" : ""} data-text={user.name}>{user.name}</span>
                        </h2>
                        <div className={`text-xs font-mono px-2 py-1 rounded border flex items-center gap-2 ${isDark ? 'border-green-500 text-green-500 bg-green-500/10' : 'border-blue-500 text-blue-500 bg-blue-500/10'}`}>
                            <span className="w-2 h-2 rounded-full bg-current animate-pulse"></span> {t.systemStatus}
                        </div>
                    </div>
                    <nav className="flex-1 py-6 px-4 space-y-2">
                        {navItems.map(item => (
                            <button key={item.id} onClick={() => scrollToSection(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded transition-all duration-300 interactive ${activeTab === item.id ? (isDark ? 'bg-matrix-accent/20 text-matrix-accent border border-matrix-accent/50 shadow-[0_0_10px_rgba(0,255,136,0.2)]' : 'bg-corp-accent/20 text-corp-accent border border-corp-accent/50') : (isDark ? 'hover:bg-gray-800 text-gray-400' : 'hover:bg-gray-200 text-gray-600')}`}>
                                <item.icon /> {item.label}
                            </button>
                        ))}
                    </nav>
                    <div className="p-6 border-t border-gray-700/30 flex justify-center gap-4">
                        <a href={user.linkedin} target="_blank" aria-label="LinkedIn" className={`interactive hover:scale-110 transition-transform ${isDark ? 'text-gray-400 hover:text-white' : 'text-gray-600 hover:text-blue-600'}`}><LinkedinIcon /></a>
                        <a href={user.github} target="_blank" aria-label="GitHub" className={`interactive hover:scale-110 transition-transform ${isDark ? 'text-gray-400 hover:text-white' : 'text-gray-600 hover:text-black'}`}><GithubIcon /></a>
                        <a href={`mailto:${user.email}`} aria-label="Email" className={`interactive hover:scale-110 transition-transform ${isDark ? 'text-gray-400 hover:text-white' : 'text-gray-600 hover:text-red-500'}`}><MailIcon /></a>
                    </div>
                </div>
            );
        };

        const BottomNav = ({ user, isDark, activeTab, scrollToSection, t }) => {
            const navItems = [
                { id: 'home', label: t.nav.home, icon: HomeIcon },
                { id: 'projects', label: t.nav.projects, icon: ChipIcon },
                { id: 'achievements', label: t.nav.achievements, icon: TrophyIcon },
            ];
            return (
                <div className={`md:hidden fixed bottom-0 left-0 w-full h-16 bottom-nav flex items-center justify-between px-6 z-50 ${isDark ? 'bg-black/90' : 'bg-white/90'}`}>
                    <div className={`font-mono font-bold text-sm glitch-wrapper ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>
                         <span className={isDark ? "glitch" : ""} data-text={user.shortName}>{user.shortName}</span>
                    </div>
                    <div className="flex gap-4">
                        {navItems.map(item => (
                            <button key={item.id} onClick={() => scrollToSection(item.id)} aria-label={item.label} className={`p-2 rounded-full transition-all duration-300 interactive ${activeTab === item.id ? (isDark ? 'text-matrix-accent bg-matrix-accent/10 scale-110' : 'text-corp-accent bg-corp-accent/10 scale-110') : 'text-gray-500'}`}>
                                <item.icon />
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const TopRightControls = ({ isDark, toggleTheme, lang, toggleLang }) => (
            <div className="absolute top-4 right-4 z-50 flex gap-2">
                <button onClick={toggleLang} aria-label="Toggle Language" className={`interactive px-3 py-1.5 rounded font-mono text-xs font-bold border transition-all ${isDark ? 'bg-matrix-accent/10 border-matrix-accent text-matrix-accent' : 'bg-corp-accent/10 border-corp-accent text-corp-accent'}`}>{lang.toUpperCase()}</button>
                <button onClick={toggleTheme} aria-label="Toggle Theme" className={`interactive p-1.5 rounded border transition-all ${isDark ? 'bg-matrix-accent/20 border-matrix-accent text-matrix-accent' : 'bg-corp-accent/10 border-corp-accent text-corp-accent'}`}>{isDark ? <SunIcon /> : <MoonIcon />}</button>
            </div>
        );

        // --- SECTIONS ---
        const HomeSection = ({ user, isDark, t }) => (
            <div className="min-h-[calc(100vh-4rem)] md:min-h-screen flex flex-col justify-center animate-fade-in py-10 md:py-0">
                <div className="glass-panel p-6 md:p-10 rounded-2xl relative overflow-hidden">
                    <div className="scanline"></div>
                    <div className="relative z-10">
                        <p className={`font-mono text-xs md:text-sm tracking-widest mb-2 ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>SYSTEM_IDENTITY: {user.name.toUpperCase()}</p>
                        <h1 className="text-3xl md:text-5xl lg:text-6xl font-bold mb-4 glitch-wrapper leading-tight">
                            <span className={isDark ? "glitch" : ""} data-text={t.headline}>{t.headline}</span>
                        </h1>
                        <div className="h-1 w-20 bg-gradient-to-r from-transparent via-current to-transparent opacity-50 mb-6"></div>
                        <div className="flex flex-col md:flex-row items-start md:items-center gap-2 md:gap-4 mb-4">
                            <span className="opacity-70 text-base md:text-lg">{t.introPrefix}</span>
                            <Typewriter phrases={t.roles} isDark={isDark} />
                        </div>
                    </div>
                </div>
            </div>
        );

        const ProjectsSection = ({ projects, isDark, t }) => (
             <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fade-in">
                {projects.map((proj, idx) => (
                    <TiltCard key={idx} className={`glass-panel p-6 rounded-xl h-full flex flex-col transition-all duration-300 group hover:-translate-y-1 ${isDark ? 'hover:shadow-[0_0_20px_rgba(0,255,136,0.15)] border-gray-800' : 'hover:shadow-lg border-gray-200'}`}>
                        <div className="flex justify-between items-start mb-4">
                            <h3 className={`font-bold text-lg leading-tight ${isDark ? 'text-white' : 'text-gray-900'}`}>{proj.title}</h3>
                            <ChipIcon className={`w-5 h-5 flex-shrink-0 ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`} />
                        </div>
                        <div className="flex flex-wrap gap-2 mb-4 pb-3 border-b border-gray-500/20">
                            {proj.tech.split(',').map((tech, i) => (
                                <span key={i} className={`text-[10px] px-2 py-0.5 rounded-full font-mono border ${isDark ? 'bg-matrix-accent/10 border-matrix-accent/30 text-matrix-accent' : 'bg-corp-accent/10 border-corp-accent/30 text-corp-accent'}`}>
                                    {tech.trim()}
                                </span>
                            ))}
                        </div>
                        <div className="space-y-2 text-sm flex-1">
                            <p><span className={`font-bold ${isDark ? 'text-red-400' : 'text-red-600'}`}>[{t.problemLabel}]</span> {proj.problem}</p>
                            <p><span className={`font-bold ${isDark ? 'text-yellow-400' : 'text-yellow-600'}`}>[{t.solutionLabel}]</span> {proj.solution}</p>
                            <p><span className={`font-bold ${isDark ? 'text-matrix-accent' : 'text-green-600'}`}>[{t.resultLabel}]</span> {proj.result}</p>
                        </div>
                    </TiltCard>
                ))}
            </div>
        );

        const AchievementsSection = ({ achievements, isDark }) => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in">
                {achievements.map((item, idx) => (
                    <TiltCard key={idx} className="glass-panel p-4 rounded-xl flex items-center gap-4 group hover:bg-white/5 transition-colors">
                        <div className={`w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 border ${isDark ? 'border-gray-700' : 'border-gray-300'}`}>
                            <SmartImage src={item.image} alt="Medal" className="w-full h-full" />
                        </div>
                        <div>
                            <h4 className={`font-bold text-base ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>{item.title}</h4>
                            <p className="text-xs opacity-70 mt-1">{item.category}</p>
                        </div>
                    </TiltCard>
                ))}
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [isDark, setIsDark] = useState(true);
            const [lang, setLang] = useState('id');
            const [activeTab, setActiveTab] = useState('home');
            const t = TRANSLATIONS[lang];

            const toggleTheme = () => {
                const newVal = !isDark;
                setIsDark(newVal);
                document.documentElement.className = newVal ? 'dark' : 'light';
            };
            const toggleLang = () => setLang(prev => prev === 'id' ? 'en' : 'id');

            // Optimized Scroll Spy
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) setActiveTab(entry.target.id);
                    });
                }, { rootMargin: '-20% 0px -50% 0px' }); // Better trigger points

                document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
                return () => observer.disconnect();
            }, []);

            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <React.Fragment>
                    <CustomCursor />
                    <CyberBackground isDark={isDark} />
                    <Sidebar user={USER_DATA} isDark={isDark} activeTab={activeTab} scrollToSection={scrollToSection} t={t} />
                    
                    <main className="md:ml-64 relative p-4 md:p-8 transition-all duration-300 overflow-hidden">
                        <TopRightControls isDark={isDark} toggleTheme={toggleTheme} lang={lang} toggleLang={toggleLang} />
                        <div className="max-w-5xl mx-auto mt-12 md:mt-0 pb-20 md:pb-0">
                            <section id="home"><HomeSection user={USER_DATA} isDark={isDark} t={t} /></section>
                            
                            <section id="projects" className="py-12 md:py-20">
                                <h2 className={`text-xl md:text-2xl font-bold mb-6 font-mono flex items-center gap-2 ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>
                                    <ChipIcon /> {t.missionLogs}
                                </h2>
                                <ProjectsSection projects={t.projects} isDark={isDark} t={t} />
                            </section>

                            <section id="achievements" className="py-12 md:py-20">
                                <h2 className={`text-xl md:text-2xl font-bold mb-6 font-mono flex items-center gap-2 ${isDark ? 'text-matrix-accent' : 'text-corp-accent'}`}>
                                    <TrophyIcon /> {t.hallOfFame}
                                </h2>
                                <AchievementsSection achievements={t.achievements} isDark={isDark} />
                            </section>
                        </div>
                    </main>
                    <BottomNav user={USER_DATA} isDark={isDark} activeTab={activeTab} scrollToSection={scrollToSection} t={t} />
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
